<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Finance Hub</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background-color: #f9fafb;
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background-color: #111827;
        color: #f9fafb;
      }

      .card {
        background-color: #1f2937;
      }
    }

    .container {
      text-align: center;
      max-width: 400px;
    }

    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      background-color: #fef3c7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    @media (prefers-color-scheme: dark) {
      .icon {
        background-color: rgba(251, 191, 36, 0.2);
      }
    }

    .icon svg {
      width: 40px;
      height: 40px;
      color: #f59e0b;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    p {
      color: #6b7280;
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }

    @media (prefers-color-scheme: dark) {
      p {
        color: #9ca3af;
      }
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem 1.5rem;
      background-color: #3b82f6;
      color: white;
      border: none;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .btn:hover {
      background-color: #2563eb;
    }

    .btn:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.5);
    }

    .btn svg {
      width: 16px;
      height: 16px;
      margin-right: 0.5rem;
    }

    .status {
      margin-top: 1.5rem;
      padding: 0.75rem;
      background-color: #fef3c7;
      border-radius: 0.5rem;
      font-size: 0.75rem;
      color: #92400e;
    }

    @media (prefers-color-scheme: dark) {
      .status {
        background-color: rgba(251, 191, 36, 0.1);
        color: #fcd34d;
      }
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.238m7.824 2.167a1 1 0 111.414 1.414m-1.414-1.414L3 3m8.293 8.293l1.414 1.414" />
      </svg>
    </div>

    <h1>Você está offline</h1>
    
    <p>
      Não foi possível conectar à internet. Verifique sua conexão e tente novamente.
    </p>

    <button class="btn" onclick="tryReconnect()">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
      </svg>
      Tentar novamente
    </button>

    <div id="status" class="status hidden">
      Verificando conexão...
    </div>
  </div>

  <script>
    function tryReconnect() {
      const status = document.getElementById('status');
      status.classList.remove('hidden');
      status.textContent = 'Verificando conexão...';

      // Check if online
      if (navigator.onLine) {
        status.textContent = 'Conexão detectada! Recarregando...';
        setTimeout(() => {
          window.location.reload();
        }, 500);
      } else {
        status.textContent = 'Ainda sem conexão. Tente novamente.';
        setTimeout(() => {
          status.classList.add('hidden');
        }, 3000);
      }
    }

    // Auto-reload when back online
    window.addEventListener('online', () => {
      window.location.reload();
    });

    // Check connection periodically
    setInterval(() => {
      if (navigator.onLine) {
        window.location.reload();
      }
    }, 10000);
  </script>
</body>
</html>
